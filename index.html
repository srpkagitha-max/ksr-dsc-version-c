<!DOCTYPE html><html lang="te"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSR DSC Exam - Version C</title><link rel="stylesheet" href="style.css"></head><body>
<div class="header"><div class="wrap top"><div><div class="brand" id="mainTitle">KSR DSC Online Exam</div><div class="sub">Version C - Code Fixed</div></div><div class="nav"><a href="admin.html">Admin</a></div></div></div>
<div class="wrap">
<div id="login" class="card"><h2>Student Login</h2><div class="notice">Admin ఇచ్చిన <b>Exam ID</b> + <b>Exam Code</b> తో మాత్రమే exam open అవుతుంది.</div>
<div class="grid"><div><label>Name</label><input id="stName" autocomplete="name"></div><div><label>Phone</label><input id="stPhone" inputmode="numeric"></div></div>
<div class="grid"><div><label>Exam ID</label><input id="stExamId" placeholder="DSC001"></div><div><label>Exam Code</label><input id="stCode" placeholder="DSC101896"></div></div>
<button class="p" onclick="studentLogin()">Start Exam</button><p id="loginMsg" class="small"></p></div>
<div id="exam" class="hide"><div class="card top"><div><b id="examTitle"></b><br><span id="prog" class="small"></span></div><div><span class="small">Warnings: <b id="warns">0</b></span> <span id="timer" class="timer">00:00</span></div></div><div class="card" id="qcard"></div><div class="card top"><button class="s" onclick="prev()">Previous</button><button class="o" onclick="mark()">Mark Review</button><button class="p" onclick="next()">Next</button><button class="d" onclick="submitExam(false)">Submit</button></div><div class="card"><b>Question Palette</b><div id="palette" class="pal"></div></div></div>
<div id="result" class="card hide"></div></div><script type="module" src="student.js"></script></body></html>
